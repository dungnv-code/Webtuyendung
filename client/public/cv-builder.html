<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <title>CV Builder - 3 Mẫu hồ sơ Chuyên Nghiệp</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Syne:wght@400;700;800&family=IBM+Plex+Sans:wght@300;400;600&display=swap"
      rel="stylesheet" />
    <link rel="icon" type="image/png" sizes="32x32"
      href="/client/src/assets/icon_logo.png">
    <link rel="icon" type="image/png" sizes="16x16"
      href="/client/src/assets/icon_logo.png">
    <style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--tc:#1a3a5c;--tc-bg:rgba(26,58,92,.12);--tc-shadow:rgba(26,58,92,.4)}
body{font-family:'DM Sans',sans-serif;background:#1a1a2e;color:#333;overflow:hidden;height:100vh}
.app{display:flex;height:100vh;overflow:hidden}

.sidebar{width:268px;flex-shrink:0;background:#0f0f1a;border-right:1px solid #2a2a3e;display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:14px 16px;border-bottom:1px solid #2a2a3e;background:linear-gradient(135deg,#0f0f1a,#1a1a2e)}
.sidebar-header h1{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:#fff;letter-spacing:.05em}
.sidebar-header p{font-size:10px;color:#555;margin-top:1px}

.template-picker{padding:10px 14px;border-bottom:1px solid #2a2a3e}
.tpl-label{font-size:9px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.1em;margin-bottom:7px}
.tpl-cards{display:flex;flex-direction:column;gap:5px}
.tpl-card{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:7px;cursor:pointer;border:1.5px solid transparent;transition:all .2s;background:#1a1a2e}
.tpl-card.active{border-color:var(--tc);background:var(--tc-bg)}
.tpl-card:hover:not(.active){border-color:#2a2a4e;background:#1c1c32}
.tpl-thumb{width:30px;height:38px;border-radius:3px;flex-shrink:0;overflow:hidden;position:relative}
.tpl-info strong{font-size:11px;font-weight:600;display:block;color:#ddd}
.tpl-info span{font-size:9px;color:#666}

.tabs{display:flex;flex-wrap:wrap;gap:3px;padding:9px 14px;border-bottom:1px solid #2a2a3e}
.tab-btn{font-size:10px;padding:4px 7px;border-radius:5px;border:1px solid #2a2a3e;background:transparent;color:#666;cursor:pointer;transition:all .2s;font-family:inherit;line-height:1}
.tab-btn.active{border-color:var(--tc);background:var(--tc-bg);color:var(--tc)}

.form-area{flex:1;overflow-y:auto;padding:12px 14px}
.form-area::-webkit-scrollbar{width:3px}
.form-area::-webkit-scrollbar-thumb{background:#2a2a3e;border-radius:2px}
.fi{margin-bottom:9px}
.fi>label{font-size:10px;color:#777;display:block;margin-bottom:3px;font-weight:500}
.fi input,.fi textarea,.fi select{width:100%;background:#1a1a2e;border:1px solid #2a2a3e;border-radius:5px;padding:5px 8px;font-size:11px;color:#ccc;font-family:inherit;outline:none;transition:border .2s}
.fi input:focus,.fi textarea:focus{border-color:var(--tc)}
.fi textarea{resize:vertical;min-height:48px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.add-btn{width:100%;padding:6px;border-radius:5px;border:1px dashed var(--tc);background:transparent;color:var(--tc);font-size:10px;cursor:pointer;margin-top:5px;font-family:inherit;transition:all .2s}
.add-btn:hover{background:var(--tc-bg)}
.item-card{background:#1a1a2e;border:1px solid #2a2a3e;border-radius:6px;padding:9px;margin-bottom:5px;position:relative}
.del-btn{position:absolute;top:7px;right:7px;width:17px;height:17px;border-radius:3px;border:1px solid #3a3a5e;background:transparent;color:#e55;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.item-card>label{font-size:9px;color:#555;display:block;margin-top:5px;margin-bottom:2px}
.item-card input,.item-card textarea{width:100%;background:#0f0f1a;border:1px solid #1a1a2e;border-radius:3px;padding:4px 6px;font-size:10px;color:#ccc;font-family:inherit;outline:none}
.item-card textarea{resize:none;height:40px}
.skill-row{display:flex;align-items:center;gap:5px;margin-bottom:5px}
.skill-row input{flex:1;background:#1a1a2e;border:1px solid #2a2a3e;border-radius:4px;padding:5px 7px;font-size:11px;color:#ccc;font-family:inherit;outline:none}
.dots{display:flex;gap:3px}
.dot{width:10px;height:10px;border-radius:50%;cursor:pointer;transition:background .15s;flex-shrink:0}
.toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.toggle-row>span{font-size:11px;color:#aaa}
.toggle{width:30px;height:17px;border-radius:9px;background:#2a2a3e;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--tc)}
.toggle::after{content:'';position:absolute;width:13px;height:13px;border-radius:50%;background:#fff;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.toggle.on::after{left:15px}
.sld{margin-bottom:9px}
.sld>label{font-size:10px;color:#777;display:block;margin-bottom:3px}
.sld input[type=range]{width:100%;accent-color:var(--tc)}
.color-dot{width:20px;height:20px;border-radius:50%;cursor:pointer;transition:all .15s;flex-shrink:0}

.action-bar{padding:10px 14px;border-top:1px solid #2a2a3e;display:flex;gap:5px}
.btn-act{flex:1;padding:8px 4px;border-radius:6px;border:none;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:4px}
.btn-print{background:#1a1a2e;border:1px solid #2a2a4e;color:#888}
.btn-print:hover{color:#ccc;border-color:#444}
.btn-pdf{color:#fff;background:var(--tc);box-shadow:0 3px 10px var(--tc-shadow)}
.btn-pdf:hover{filter:brightness(1.1)}
.btn-reset{background:#1a1a2e;border:1px solid #2a2a4e;color:#666;flex:0 0 auto;padding:8px 10px}

.cv-area{flex:1;background:#141420;display:flex;flex-direction:column;align-items:center;overflow-y:auto;padding:20px 24px}
.cv-area::-webkit-scrollbar{width:5px}
.cv-area::-webkit-scrollbar-thumb{background:#2a2a3e;border-radius:3px}
.cv-meta{width:794px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.badge-pill{font-size:10px;padding:4px 11px;border-radius:20px;background:#0f0f1a;border:1px solid #2a2a3e;color:#777}
.badge-ok{border-color:#14532d!important;color:#4ade80!important}
.badge-warn{border-color:#7f1d1d!important;color:#f87171!important}
.cv-shadow{box-shadow:0 20px 60px rgba(0,0,0,.6)}

#cv-classic{background:#fff;width:794px;min-height:1123px;font-family:'DM Sans',sans-serif;font-size:13px;line-height:1.6;color:#2d2d2d}
.c1-hd{padding:32px 40px;display:flex;gap:22px;align-items:center}
.c1-av{width:90px;height:90px;border-radius:50%;flex-shrink:0;overflow:hidden;cursor:pointer;display:flex;align-items:center;justify-content:center;border:3px solid rgba(255,255,255,.25)}
.c1-av img{width:100%;height:100%;object-fit:cover}
.c1-name{font-size:24px;font-weight:700;color:#fff;line-height:1.1;letter-spacing:-.01em}
.c1-pos{font-size:12px;color:rgba(255,255,255,.6);margin-top:3px}
.c1-contacts{display:flex;flex-wrap:wrap;gap:5px 16px;margin-top:10px}
.c1-ci{display:flex;align-items:center;gap:4px;font-size:10.5px;color:rgba(255,255,255,.65)}
.c1-body{display:flex;min-height:calc(1123px - 154px)}
.c1-side{width:210px;flex-shrink:0;padding:24px 20px;border-right:1px solid #eaeaea}
.c1-main{flex:1;padding:24px 30px}
.c1-st{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;padding-bottom:4px;margin-bottom:11px;border-bottom:2px solid}
.c1-entry{margin-bottom:14px}
.c1-date{font-size:10px;color:#aaa}
.c1-title{font-size:13px;font-weight:600;color:#1a1a1a}
.c1-sub{font-size:11px;font-weight:500}
.c1-desc{font-size:11px;color:#666;margin-top:2px;line-height:1.5}
.c1-sk{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.c1-skn{font-size:11px;color:#444}
.c1-dots{display:flex;gap:3px}
.c1-d{width:8px;height:8px;border-radius:50%}

#cv-modern{background:#fff;width:794px;min-height:1123px;font-family:'IBM Plex Sans',sans-serif;font-size:13px;line-height:1.6;color:#1a1a1a;position:relative;overflow:hidden}
.c2-left{position:absolute;top:0;left:0;bottom:0;width:250px;padding:32px 24px}
.c2-right{margin-left:250px;padding:32px 30px}
.c2-av{width:82px;height:82px;border-radius:10px;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer;margin-bottom:14px;border:2px solid rgba(255,255,255,.12)}
.c2-av img{width:100%;height:100%;object-fit:cover}
.c2-name{font-size:19px;font-weight:600;color:#fff;line-height:1.1;margin-bottom:2px}
.c2-pos{font-size:11px;color:#a1a1aa;font-weight:300;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,.1)}
.c2-ci{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.c2-ico{width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px}
.c2-ct{font-size:9.5px;color:#a1a1aa;word-break:break-all}
.c2-sl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;margin:16px 0 8px;padding-bottom:4px;border-bottom:1px solid rgba(255,255,255,.1)}
.c2-skn{font-size:10px;color:#d4d4d8;margin-bottom:3px}
.c2-bar{height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;margin-bottom:7px}
.c2-fill{height:100%;border-radius:2px}
.c2-rname{font-size:26px;font-weight:600;letter-spacing:-.02em;margin-bottom:2px}
.c2-rpos{font-size:12px;font-weight:300;margin-bottom:18px;padding-bottom:14px;border-bottom:2px solid}
.c2-rt{font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.c2-rt::after{content:'';flex:1;height:1px;background:currentColor;opacity:.1}
.c2-entry{display:flex;gap:12px;margin-bottom:12px}
.c2-edate{font-size:10px;color:#999;width:72px;flex-shrink:0;padding-top:1px;line-height:1.3}
.c2-ec{flex:1}
.c2-etitle{font-size:13px;font-weight:600}
.c2-esub{font-size:11px;font-weight:300;margin-top:1px}
.c2-edesc{font-size:11px;color:#555;margin-top:3px;line-height:1.5}
.c2-block{margin-bottom:18px}

#cv-editorial{background:#fafaf8;width:794px;min-height:1123px;font-family:'Cormorant Garamond',serif;font-size:14px;line-height:1.7;color:#1c1c1c}
.c3-hd{padding:40px 44px 24px;border-bottom:1px solid #d4c9b0}
.c3-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.c3-name{font-size:44px;font-weight:600;letter-spacing:-.02em;line-height:1}
.c3-pos{font-size:14px;font-weight:300;font-style:italic;letter-spacing:.04em;color:#888;margin-top:4px}
.c3-av{width:80px;height:80px;border-radius:4px;overflow:hidden;cursor:pointer;background:#e5ddd0;display:flex;align-items:center;justify-content:center;border:1px solid #d4c9b0;flex-shrink:0}
.c3-av img{width:100%;height:100%;object-fit:cover}
.c3-contacts{display:flex;gap:20px;flex-wrap:wrap}
.c3-ci{font-family:'DM Sans',sans-serif;font-size:10.5px;color:#888;display:flex;align-items:center;gap:4px}
.c3-body{display:flex}
.c3-side{width:220px;flex-shrink:0;padding:24px 20px 24px 44px;border-right:1px solid #d4c9b0}
.c3-main{flex:1;padding:24px 40px 24px 28px}
.c3-st{font-family:'DM Sans',sans-serif;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.15em;color:#aaa;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #e5ddd0}
.c3-entry{margin-bottom:14px}
.c3-date{font-family:'DM Sans',sans-serif;font-size:10px;color:#bbb;margin-bottom:1px}
.c3-title{font-size:14px;font-weight:600}
.c3-sub{font-size:12px;font-style:italic;color:#999}
.c3-desc{font-size:11px;font-family:'DM Sans',sans-serif;color:#666;margin-top:3px;line-height:1.55}
.c3-sk{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.c3-skn{font-size:13px}
.c3-dots3{display:flex;gap:3px}
.c3-d3{width:7px;height:7px;border-radius:50%;border:1px solid}
.c3-quote{font-size:14px;font-style:italic;line-height:1.6;color:#666;padding:14px 0;border-top:1px solid #e5ddd0;border-bottom:1px solid #e5ddd0;margin-bottom:18px}
.c3-block{margin-bottom:20px}
</style>
  </head>
  <body>
    <div class="app">

      <div class="sidebar">
        <div class="sidebar-header">
          <h1><i class="fa-solid fa-file-lines"
              style="margin-right:6px;color:var(--tc)"></i>CV Builder Pro</h1>
          <p>3 mẫu chuyên nghiệp · Nhấp để chỉnh sửa</p>
        </div>

        <div class="template-picker">
          <div class="tpl-label">Chọn mẫu CV</div>
          <div class="tpl-cards">
            <div class="tpl-card active" id="tcard-classic"
              onclick="selectTemplate('classic')">
              <div class="tpl-thumb"
                style="background:linear-gradient(135deg,#1a3a5c,#0d2137)">
                <div
                  style="height:12px;background:rgba(255,255,255,.3);margin:4px 3px 2px"></div>
                <div
                  style="height:2px;background:rgba(255,255,255,.15);margin:0 3px 2px"></div>
                <div
                  style="flex:1;background:rgba(255,255,255,.07);margin:0 3px;margin-bottom:3px"></div>
              </div>
              <div class="tpl-info"><strong>Classic Pro</strong><span>2 cột ·
                  Truyền thống</span></div>
              <i class="fa-solid fa-check" id="ck-classic"
                style="font-size:10px;color:var(--tc)"></i>
            </div>
            <div class="tpl-card" id="tcard-modern"
              onclick="selectTemplate('modern')">
              <div class="tpl-thumb" style="background:#18181b;display:flex">
                <div
                  style="width:38%;background:rgba(99,102,241,.3);height:100%"></div>
                <div style="flex:1;padding:3px 3px">
                  <div
                    style="height:5px;background:rgba(255,255,255,.4);border-radius:1px;margin-bottom:2px"></div>
                  <div
                    style="height:2px;background:rgba(255,255,255,.15);width:60%;border-radius:1px"></div>
                </div>
              </div>
              <div class="tpl-info"><strong>Modern Dark</strong><span>Tối giản ·
                  Ấn tượng</span></div>
              <i class="fa-solid fa-check" id="ck-modern"
                style="font-size:10px;color:#6366f1;display:none"></i>
            </div>
            <div class="tpl-card" id="tcard-editorial"
              onclick="selectTemplate('editorial')">
              <div class="tpl-thumb"
                style="background:#fafaf8;border:1px solid #e5ddd0">
                <div
                  style="height:10px;background:#c4b89a;margin:4px 3px 3px"></div>
                <div
                  style="height:1px;background:#d4c9b0;margin:0 3px 3px"></div>
                <div
                  style="flex:1;background:#ede8df;margin:0 3px;margin-bottom:3px"></div>
              </div>
              <div class="tpl-info"><strong>Editorial</strong><span>Serif · Sang
                  trọng</span></div>
              <i class="fa-solid fa-check" id="ck-editorial"
                style="font-size:10px;color:#8b6914;display:none"></i>
            </div>
          </div>
        </div>

        <div class="tabs" id="tabs">
          <button class="tab-btn active" onclick="setTab(event,'design')">Thiết
            kế</button>
          <button class="tab-btn" onclick="setTab(event,'layout')">Bố
            cục</button>
          <button class="tab-btn" onclick="setTab(event,'personal')">Cá
            nhân</button>
          <button class="tab-btn" onclick="setTab(event,'education')">Học
            vấn</button>
          <button class="tab-btn" onclick="setTab(event,'experience')">KN
            làm</button>
          <button class="tab-btn" onclick="setTab(event,'skills')">Kỹ
            năng</button>
          <button class="tab-btn" onclick="setTab(event,'projects')">Dự
            án</button>
          <button class="tab-btn" onclick="setTab(event,'more')">Thêm</button>
        </div>

        <div class="form-area" id="form-area"></div>

        <div class="action-bar">
          <button class="btn-act btn-reset" onclick="resetState()"
            title="Reset về mặc định"><i
              class="fa-solid fa-rotate-left"></i></button>
          <button class="btn-act btn-print" onclick="handlePrint()"><i
              class="fa-solid fa-print"></i> In CV</button>
          <button class="btn-act btn-pdf" onclick="handlePrint()"><i
              class="fa-solid fa-file-arrow-down"></i> Tải PDF</button>
        </div>
      </div>

      <div class="cv-area">
        <div class="cv-meta">
          <span class="badge-pill"><i class="fa-solid fa-pencil"
              style="margin-right:4px"></i>Nhấp vào CV để chỉnh sửa trực
            tiếp</span>
          <span class="badge-pill badge-ok" id="page-badge"><i
              class="fa-solid fa-file" style="margin-right:4px"></i>1 trang
            A4</span>
        </div>
        <div id="cv-wrapper" class="cv-shadow">
          <div id="cv-classic"></div>
          <div id="cv-modern" style="display:none"></div>
          <div id="cv-editorial" style="display:none"></div>
        </div>
        <div style="height:40px"></div>
      </div>

    </div>

    <input type="file" id="photo-input" accept="image/*" style="display:none"
      onchange="handlePhoto(event)">
    <script>
const DEF = {
  tpl:'classic', tab:'design',
  name:'Nguyễn Văn Nam', position:'Kỹ sư Phần mềm',
  dob:'01/01/2000', gender:'Nam', phone:'0123 456 789',
  email:'email@example.com', website:'linkedin.com/in/doan', address:'Hà Nội, Việt Nam',
  objective:'Với 3 năm kinh nghiệm phát triển phần mềm, tôi mong muốn đóng góp kỹ năng và sự sáng tạo vào các dự án có tầm ảnh hưởng lớn, không ngừng học hỏi và phát triển bản thân.',
  education:[{school:'Đại học Bách Khoa Hà Nội',major:'Kỹ thuật Máy tính',start:'2018',end:'2022',desc:'GPA: 3.6/4.0 · Học bổng xuất sắc liên tiếp 3 năm'}],
  experience:[{company:'Tech Corp Vietnam',role:'Senior Developer',start:'2022',end:'Nay',desc:'Phát triển hệ thống microservices phục vụ 500K+ người dùng. Tối ưu hiệu năng giảm 40% thời gian tải trang. Mentor cho 3 junior developers.'}],
  skills:[{name:'React / Next.js',level:5},{name:'Node.js / Express',level:4},{name:'Python / FastAPI',level:4},{name:'Docker / Kubernetes',level:3}],
  projects:[{name:'E-Commerce Platform',role:'Lead Dev',start:'2023',end:'2024',tech:'React, Node.js, MongoDB, Redis',desc:'Xây dựng nền tảng TMĐT đạt 10K đơn/ngày, tích hợp thanh toán VNPay, Momo.'}],
  awards:[{name:'Nhân viên xuất sắc Q3/2023',date:'2023'}],
  hobbies:'Đọc sách công nghệ · Mã nguồn mở · Nhiếp ảnh',
  extraInfo:'Sẵn sàng làm việc toàn thời gian · Có thể bắt đầu ngay · Tiếng Anh B2',
  photo:null,
  accentColor:'#1a3a5c', fontSize:13, lineHeight:1.6, sectionSpacing:20,
  show:{objective:true,education:true,experience:true,skills:true,projects:true,awards:true,hobbies:true,extra:true}
};

const THEMES = {
  classic:{tc:'#1a3a5c',tcBg:'rgba(26,58,92,.12)',tcShadow:'rgba(26,58,92,.35)'},
  modern:{tc:'#6366f1',tcBg:'rgba(99,102,241,.12)',tcShadow:'rgba(99,102,241,.35)'},
  editorial:{tc:'#8b6914',tcBg:'rgba(139,105,20,.1)',tcShadow:'rgba(139,105,20,.3)'}
};

let S = JSON.parse(JSON.stringify(DEF));

function applyTheme(){
  const th = THEMES[S.tpl];
  const tc = S.accentColor || th.tc;
  document.documentElement.style.setProperty('--tc', tc);
  document.documentElement.style.setProperty('--tc-bg', th.tcBg);
  document.documentElement.style.setProperty('--tc-shadow', th.tcShadow);
}

function selectTemplate(tpl){
  S.tpl = tpl;
  S.accentColor = THEMES[tpl].tc;
  ['classic','modern','editorial'].forEach(t=>{
    document.getElementById('tcard-'+t).classList.toggle('active',t===tpl);
    document.getElementById('ck-'+t).style.display=t===tpl?'inline':'none';
    document.getElementById('cv-'+t).style.display=t===tpl?'block':'none';
  });
  applyTheme();
  renderCV();
  renderForm();
  checkPages();
}

function setTab(e,tab){
  S.tab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));

}

function setColor(c){
  S.accentColor=c;
  applyTheme();
  renderCV();
  renderForm();
}

function renderCV(){
  const ac=S.accentColor||THEMES[S.tpl].tc;
  const ss=S.sectionSpacing;
  if(S.tpl==='classic') renderClassic(ac,ss);
  else if(S.tpl==='modern') renderModern(ac,ss);
  else if(S.tpl==='editorial') renderEditorial(ac,ss);
  setTimeout(checkPages,120);
}

function dots(level,ac,sz=8,gp=3){
  return [1,2,3,4,5].map(n=>`<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${n<=level?ac:'#e5e7eb'}"></div>`).join('');
}

          <div style="font-family:'DM Sans',sans-serif;font-size:10px;color:#bbb">${esc(a.date)}</div>

      ${S.show.hobbies&&S.hobbies?`<div class="c3-block" style="margin-top:16px">
        <div class="c3-st" style="color:${ac}">Sở thích</div>
        <div style="font-family:'DM Sans',sans-serif;font-size:11px;color:#888;line-height:1.5">${esc(S.hobbies)}</div>

    </div>
    <div class="c3-main">
      ${S.show.objective&&S.objective?`<div class="c3-quote">"${esc(S.objective)}"</div>`:''}
      ${S.show.education&&S.education.length?`<div class="c3-block">

          <div class="c3-title">${esc(e.school)}</div>
          <div class="c3-sub" style="color:${ac}">${esc(e.major)}</div>

        </div>`).join('')}
      </div>`:''}
      ${S.show.experience&&S.experience.length?`<div class="c3-block">

      </div>`:''}
      ${S.show.projects&&S.projects.length?`<div class="c3-block">
        <div class="c3-st" style="color:${ac}">Dự án</div>
        ${S.projects.map(p=>`<div class="c3-entry">

          ${p.desc?`<div class="c3-desc">${esc(p.desc)}</div>`:''}
        </div>`).join('')}
      </div>`:''}
      ${S.show.extra&&S.extraInfo?`<div class="c3-block">
        <div class="c3-st" style="color:${ac}">Thông tin thêm</div>
        <div style="font-family:'DM Sans',sans-serif;font-size:11px;color:#777;line-height:1.5">${esc(S.extraInfo)}</div>
      </div>`:''}

}

function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function darken(hex, amt){
  let c=hex.replace('#','');
  if(c.length===3) c=c[0]+c[0]+c[1]+c[1]+c[2]+c[2];
  let r=parseInt(c.slice(0,2),16);
  let g=parseInt(c.slice(2,4),16);
  let b=parseInt(c.slice(4,6),16);
  r=Math.max(0,Math.round(r*(1-amt)));
  g=Math.max(0,Math.round(g*(1-amt)));
  b=Math.max(0,Math.round(b*(1-amt)));
  return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}

function checkPages(){
  const w=document.getElementById('cv-wrapper');
  if(!w) return;
  const h=w.scrollHeight;
  const pages=Math.max(1,Math.ceil(h/1123));
  const badge=document.getElementById('page-badge');
  if(!badge) return;
  if(pages>1){
    badge.className='badge-pill badge-warn';
    badge.innerHTML=`<i class="fa-solid fa-triangle-exclamation" style="margin-right:4px"></i>${pages} trang A4`;
  } else {
    badge.className='badge-pill badge-ok';
    badge.innerHTML=`<i class="fa-solid fa-file" style="margin-right:4px"></i>1 trang A4`;
  }
}

function triggerPhoto(){
  document.getElementById('photo-input').click();
}

function handlePhoto(e) {
  const f = e.target.files[0];
  if (!f) return;

  if (!f.type.startsWith("image/")) {
    alert("Vui lòng chọn file ảnh");
    return;
  }

  const r = new FileReader();

  r.onload = (ev) => {
    S.photo = ev.target.result;
    renderCV();
  };

  r.onerror = () => {
    alert("Không thể đọc file");
  };

  r.readAsDataURL(f);
}

function handlePrint() {
  const cvEl = document.getElementById('cv-' + S.tpl);
  if (!cvEl) return;

  const styles = Array.from(document.querySelectorAll('style'))
    .map(s => s.textContent)
    .join('\n');

  const links = Array.from(document.querySelectorAll('link[rel="stylesheet"]'))
    .map(l => l.outerHTML)
    .join('\n');

  const win = window.open('', '_blank', 'width=850,height=950,scrollbars=yes');
  if (!win) {
    alert('Vui lòng cho phép popup để in CV.');
    return;
  }

  win.document.write(`
    <!DOCTYPE html>
    <html>
    <head>
      <meta charset="utf-8">
      ${links}
      <style>
        ${styles}
        *{box-sizing:border-box}
        body{margin:0;padding:0;background:#fff}
        button{display:none!important}
        @page{size:A4;margin:0}
        @media print{
          html,body{margin:0;padding:0}
        }
      </style>
    </head>
    <body>${cvEl.outerHTML}</body>
    </html>
  `);

  win.document.close();

  win.onload = () => {
  win.focus();
  setTimeout(() => {
    win.print();
  }, 500); 
};
}

applyTheme();
renderCV();
renderForm();
